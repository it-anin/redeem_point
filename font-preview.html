<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>เลือกฟอนต์ — วันนี้มีรางวัลรออยู่นะ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;600&family=Sriracha&family=Charm:wght@400;700&family=Charmonman:wght@400;700&family=Mitr:wght@400;600&family=Prompt:wght@400;600&family=Kanit:wght@400;600&family=Pridi:wght@400;600&family=Bai+Jamjuree:wght@400;600&family=Chonburi&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #FFF3EC;
    color: #3A2A20;
    padding: 36px 20px 70px;
  }
  .head { text-align: center; margin-bottom: 32px; }
  .head h1 { font-size: 22px; }
  .head p { color: #A98571; margin-top: 6px; font-size: 14px; }

  .grid {
    max-width: 760px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 18px;
  }
  .row {
    background: #fff; border: 1.5px solid #F6D8C5; border-radius: 16px;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 16px;
  }
  .fname { width: 130px; flex-shrink: 0; font-size: 13px; font-weight: 800; color: #A85A2E; }

  /* โลโก้ + กล่องคำพูด (จำลองหน้าจริง) */
  .demo { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    background: #FBD3B9; border: 1.5px solid #F6D8C5;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .bubble {
    position: relative;
    background: #fff; border: 1.5px solid #F6D8C5; border-radius: 14px;
    padding: 10px 16px; font-size: 18px; color: #8a6d52;
  }
  .bubble::before {
    content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
    border-top: 9px solid transparent; border-bottom: 9px solid transparent;
    border-right: 10px solid #F6D8C5;
  }
  .bubble::after {
    content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%);
    border-top: 8px solid transparent; border-bottom: 8px solid transparent;
    border-right: 9px solid #fff;
  }

  .f-itim       { font-family: 'Itim', cursive; }
  .f-mali       { font-family: 'Mali', cursive; }
  .f-sriracha   { font-family: 'Sriracha', cursive; }
  .f-charm      { font-family: 'Charm', cursive; }
  .f-charmonman { font-family: 'Charmonman', cursive; font-size: 22px; }
  .f-mitr       { font-family: 'Mitr', sans-serif; }
  .f-prompt     { font-family: 'Prompt', sans-serif; }
  .f-kanit      { font-family: 'Kanit', sans-serif; }
  .f-pridi      { font-family: 'Pridi', serif; }
  .f-baijam     { font-family: 'Bai Jamjuree', sans-serif; }
  .f-chonburi   { font-family: 'Chonburi', cursive; }
</style>
</head>
<body>
  <div class="head">
    <h1>เลือกฟอนต์สำหรับ "วันนี้มีรางวัลรออยู่นะ"</h1>
    <p>ชอบแบบไหน บอกชื่อฟอนต์มาได้เลย</p>
  </div>

  <div class="grid" id="grid"></div>

<script>
  const fonts = [
    ['Itim', 'f-itim'],
    ['Mali', 'f-mali'],
    ['Sriracha', 'f-sriracha'],
    ['Charm', 'f-charm'],
    ['Charmonman', 'f-charmonman'],
    ['Mitr', 'f-mitr'],
    ['Prompt', 'f-prompt'],
    ['Kanit', 'f-kanit'],
    ['Pridi', 'f-pridi'],
    ['Bai Jamjuree', 'f-baijam'],
    ['Chonburi', 'f-chonburi'],
  ];
  const grid = document.getElementById('grid');
  fonts.forEach(([name, cls]) => {
    grid.insertAdjacentHTML('beforeend', `
      <div class="row">
        <div class="fname">${name}</div>
        <div class="demo">
          <div class="logo">⭐</div>
          <div class="bubble ${cls}">วันนี้มีรางวัลรออยู่นะ</div>
        </div>
      </div>
    `);
  });
</script>
</body>
</html>
