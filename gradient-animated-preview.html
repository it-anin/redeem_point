<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Animated Gradient Card — เลือกแบบ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Itim&family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #FFF3EC; color: #3A2A20; padding: 32px 18px 60px; }
  .head { text-align: center; margin-bottom: 28px; }
  .head h1 { font-size: 22px; }
  .head p { color: #A98571; margin-top: 6px; font-size: 13px; }

  .grid { max-width: 880px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 22px; }
  .item { text-align: center; }
  .item .name { font-weight: 800; font-size: 13px; color: #A85A2E; margin-bottom: 10px; }

  .card {
    border-radius: 24px; border: 2px solid #F6D8C5; padding: 22px; text-align: center;
    color: #A85A2E; overflow: hidden; position: relative;
  }
  .emoji { font-size: 26px; margin-bottom: 8px; }
  .num { font-size: 28px; font-weight: 800; }
  .label { font-size: 12px; color: #8a6d52; font-weight: 600; margin-top: 2px; }

  /* 1 · ไหลซ้าย-ขวา (flowing) */
  .a1 {
    background: linear-gradient(120deg, #FFF3DA, #FFD9C2, #FFC4C9, #FFE9A8, #FFF3DA);
    background-size: 300% 300%;
    animation: flow 6s ease infinite;
  }
  @keyframes flow { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

  /* 2 · ไหลแนวทแยง (diagonal) */
  .a2 {
    background: linear-gradient(135deg, #FFE9A8, #FBD3B9, #FFC4C9, #FBD3B9);
    background-size: 400% 400%;
    animation: flow 8s linear infinite;
  }

  /* 3 · หายใจ (pulse zoom) */
  .a3 {
    background: radial-gradient(circle at 50% 40%, #FFF3DA, #FBD3B9);
    background-size: 130% 130%;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{background-position:50% 50%; background-size:130% 130%;} 50%{background-position:50% 50%; background-size:170% 170%;} }

  /* 4 · ขอบเรืองหมุน (rotating glow ring) */
  .a4 { background:#FFFBF0; }
  .a4::before {
    content:''; position:absolute; inset:-50%;
    background: conic-gradient(#FFE9A8, #FFC4C9, #FBD3B9, #FFE9A8);
    animation: spin 5s linear infinite; z-index:0;
  }
  .a4::after { content:''; position:absolute; inset:3px; background:#FFFBF0; border-radius:20px; z-index:0; }
  .a4 > * { position: relative; z-index: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 5 · แสงกวาดผ่าน (shine sweep) */
  .a5 { background: linear-gradient(135deg, #FFE7D6, #FFD9C2); }
  .a5::before {
    content:''; position:absolute; top:0; left:-60%; width:50%; height:100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.7), transparent);
    transform: skewX(-20deg); animation: sweep 3s ease-in-out infinite;
  }
  @keyframes sweep { 0%{left:-60%;} 60%,100%{left:130%;} }

  /* 6 · สลับสี (hue shift) */
  .a6 {
    background: linear-gradient(135deg, #FFC4C9, #FFE9A8);
    animation: hue 8s linear infinite;
  }
  @keyframes hue { from{filter:hue-rotate(0deg);} to{filter:hue-rotate(40deg);} }
</style>
</head>
<body>
  <div class="head">
    <h1>Animated Gradient Card 6 แบบ</h1>
    <p>การ์ดมีพื้นหลัง gradient เคลื่อนไหว — ชอบแบบไหนบอกหมายเลข</p>
  </div>
  <div class="grid" id="grid"></div>
<script>
  const cards = [
    ['1 · Flowing (ไหลซ้าย-ขวา)', 'a1'],
    ['2 · Diagonal (ไหลทแยง)', 'a2'],
    ['3 · Breathe (หายใจซูม)', 'a3'],
    ['4 · Rotating Glow (ขอบหมุน)', 'a4'],
    ['5 · Shine Sweep (แสงกวาด)', 'a5'],
    ['6 · Hue Shift (สลับเฉดสี)', 'a6'],
  ];
  const grid = document.getElementById('grid');
  cards.forEach(([name, cls]) => {
    grid.insertAdjacentHTML('beforeend', `
      <div class="item">
        <div class="name">${name}</div>
        <div class="card ${cls}">
          <div class="emoji">⭐</div>
          <div class="num">1,250</div>
          <div class="label">แต้มที่ใช้ไป</div>
        </div>
      </div>
    `);
  });
</script>
</body>
</html>
